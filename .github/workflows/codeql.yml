# GitHub workflow for CodeQL security analysis
# Documentation file - licensed under CC BY-SA 4.0

name: CodeQL

on:
  push:
    branches:
      - main
      - 'cto/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build
        run: |
          # Build the helloworld demonstration project
          mvn compile -f docs/src/helloworld/pom.xml -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
