# GitHub workflow for dependency graph submission
# Documentation file - licensed under CC BY-SA 4.0

name: Dependency Graph

on:
  push:
    branches:
      - main
      - 'cto/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: read
  dependency-graph: write

jobs:
  dependency-graph:
    name: Submit Dependency Graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build helloworld project
        run: mvn compile -f docs/helloworld/pom.xml -DskipTests

      - name: Submit dependency graph
        # Action: advanced-security/maven-dependency-submission-action@v5
        # Author: GitHub (Advanced Security Team)
        # Research: Official GitHub action for Maven dependency graph submission
        # Usage: 38k+ | License: MIT | Maintained: Active
        uses: advanced-security/maven-dependency-submission-action@v5
        with:
          maven-pom-file: docs/helloworld/pom.xml
          dependency-categories: runtime,compile
