# pre-commit configuration for HelloWorld project
# This file is documentation (CC BY-SA)

repos:
  # REUSE compliance check - validates SPDX headers
  - repo: https://github.com/fsfe/reuse-tool
    rev: v4.0.3
    hooks:
      - id: reuse
        args: ['lint']

  # Standard file checks - no external downloads needed
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  # Curry-Howard compilation gate - proof-theoretic classification
  - repo: local
    hooks:
      - id: maven-compilation-gate
        name: Curry-Howard Compilation Gate
        entry: ./scripts/compilation-gate.sh
        language: script
        pass_filenames: false
        always_run: true
        description: >
          Implements proof-theoretic classification:
          - Exit 0 + Java changes → Closed Proof (AGPL)
          - Exit 0 + Documentation only → Open Branch (CC-BY-SA)
          - Exit ≠ 0 + Java changes → GIGO (Reject commit)

fail_fast: false
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
