# pre-commit configuration for HelloWorld project
# This file is documentation (CC BY-SA) - the tools it configures are AGPL

repos:
  - repo: https://github.com/fsfe/reuse-tool
    rev: v4.0.3
    hooks:
      - id: reuse
        args: ['lint']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/jpetazzo/pre-commit-java
    rev: v1.0.4
    hooks:
      - id: java-format
      - id: java-checkstyle

fail_fast: false
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
